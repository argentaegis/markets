# SPY buy-and-hold benchmark for TAA case study.
# Same window, broker, fill_timing as flagship for apples-to-apples comparison.
# Data: catalog (requires SPY in data/exports/)
symbol: SPY
instrument_type: equity
start: "2019-03-01T00:00:00+00:00"
end: "2026-03-10T00:00:00+00:00"
timeframe_base: "1d"
initial_cash: 100000.0
fill_timing: next_bar_open
broker: ibkr_equity_spread  # 10 bps equity spread/slippage

strategy:
  name: buy_and_hold_underlying
  symbol: SPY
  qty: 350  # ~$98k at SPY ~$280 (Mar 2019)
